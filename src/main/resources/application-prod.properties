# ── Production profile (used on Render.com) ──────────────────────────────────
server.port=${PORT:8080}
spring.jackson.time-zone=Asia/Singapore

# ── PostgreSQL Database (Neon.tech free tier) ─────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:MySecure32CharacterKeyForJWT2024!}
app.jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:https://fookway.vercel.app}

# ── QR Code frontend base URL ────────────────────────────────────────────────
app.qr.frontend-base-url=${FRONTEND_URL:https://fookway.vercel.app}
