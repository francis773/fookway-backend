# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ── MySQL Database ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_qr_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──────────────────────────────────────────────────────────────────────
# Replace with a strong 256-bit secret in production (never commit real secrets)
app.jwt.secret=CHANGE_ME_32chars_min_secret_key_here_for_HS256_algo
app.jwt.expiration-ms=86400000

# ── CORS allowed origin ──────────────────────────────────────────────────────
app.cors.allowed-origin=http://localhost:5173
app.cors.allowed-origins=http://localhost:5173,http://192.168.101.54:5173

# ── QR Code frontend base URL ────────────────────────────────────────────────
app.qr.frontend-base-url=http://localhost:5173

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.restaurant=DEBUG
logging.level.org.springframework.security=INFO
